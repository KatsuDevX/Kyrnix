<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>System Update Required</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            text-align: center;
        }
        .logo {
            width: 80px;
            height: 80px;
            background: #667eea;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            font-size: 40px;
            color: white;
        }
        h1 {
            font-size: 22px;
            color: #333;
            margin-bottom: 10px;
        }
        p {
            color: #666;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 10px;
            animation: progress 3s ease-in-out forwards;
        }
        @keyframes progress {
            0% { width: 0%; }
            50% { width: 65%; }
            100% { width: 100%; }
        }
        .status {
            color: #999;
            font-size: 13px;
            margin: 10px 0;
        }
        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            font-size: 15px;
            cursor: pointer;
            margin-top: 15px;
            display: none;
        }
        .btn:hover { background: #5a6fd6; }
        .version { color: #bbb; font-size: 11px; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">🛡️</div>
        <h1>Обновление безопасности системы</h1>
        <p>Ваша система требует установки критического обновления.<br>Пожалуйста, дождитесь завершения проверки.</p>
        
        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>
        
        <div class="status" id="status">Проверка компонентов...</div>
        
        <button class="btn" id="finishBtn" onclick="window.close()">Завершить</button>
        
        <div class="version">Версия: 2.4.1.0 | © 2026 Microsoft Corporation</div>
    </div>

    <script>
        // Эмуляция процесса "проверки"
        const statuses = [
            "Проверка компонентов...",
            "Анализ системных файлов...",
            "Обновление модулей безопасности...",
            "Проверка целостности данных...",
            "Установка обновлений...",
            "Завершение настройки..."
        ];
        
        let i = 0;
        const statusEl = document.getElementById('status');
        const btn = document.getElementById('finishBtn');
        
        const interval = setInterval(() => {
            i++;
            if (i < statuses.length) {
                statusEl.textContent = statuses[i];
            }
            if (i >= statuses.length) {
                clearInterval(interval);
                statusEl.textContent = "✅ Обновление успешно установлено";
                btn.style.display = 'inline-block';
            }
        }, 2500);
    </script>
</body>
</html>
